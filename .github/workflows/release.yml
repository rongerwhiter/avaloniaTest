# @format

name: Build Windows AOT Installer
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install VC++ BuildTools & NSIS
        run: |
          choco install -y nsis
          Invoke-WebRequest https://aka.ms/vs/17/release/vs_BuildTools.exe -OutFile vs_BuildTools.exe
          .\vs_BuildTools.exe --quiet --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.Windows10SDK.19041 --norestart
          refreshenv

      - name: Restore workload & nuget
        run: |
          dotnet workload install microsoft-net-sdk-desktop
          dotnet restore

      - name: Publish Windows AOT
        run: |
          dotnet publish -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishAot=true `
            -o ./publish/win-x64

      # 修复PowerShell调用exe传参语法，用&调用
      - name: Build NSIS Setup.exe
        run: |
          & "C:\Program Files\NSIS\makensis.exe" installer_win.nsi

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-AOT-Setup
          path: |
            *.exe
            ./publish/win-x64/*.exe

  auto-release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          path: ./win_package

      - name: Create Release & Attach Windows exe
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./win_package/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
