# @format

name: Windows AOT Enterprise Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      release_tag:
        description: "v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PROJECT_NAME: AvaloniaApplication1
  RUNTIME: win-x64
  CONFIG: Release

jobs:
  # =========================
  # 1. Version Job（统一版本源）
  # =========================
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=${{ inputs.release_tag }}
          else
            TAG=${GITHUB_REF_NAME}
          fi

          VERSION=${TAG#v}

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # =========================
  # 2. Build Job
  # =========================
  build:
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install NSIS
        run: choco install nsis -y

      - name: Restore
        run: dotnet restore

      # =========================
      # AOT Build（唯一产物）
      # =========================
      - name: Publish AOT
        run: |
          dotnet publish -c $env:CONFIG -r $env:RUNTIME `
            --self-contained true `
            -p:PublishAot=true `
            -p:PublishSingleFile=true `
            -p:Version=${{ needs.version.outputs.version }} `
            -o build/aot

      # =========================
      # Inject Version into NSIS
      # =========================
      - name: Build installer
        shell: pwsh
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"

          if (!(Test-Path $makensis)) {
            throw "NSIS not found"
          }

          $env:APP_VERSION = "${{ needs.version.outputs.version }}"

          & $makensis installer_win.nsi

      # =========================
      # Clean Output (商业级关键)
      # =========================
      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null

          $app = Get-ChildItem build/aot -Filter *.exe | Select-Object -First 1

          Copy-Item $app.FullName dist/AvaloniaApplication1.exe
          Copy-Item *.exe dist/AvaloniaApp_Setup.exe

          # 生成 hash（企业级）
          Get-FileHash dist/*.exe -Algorithm SHA256 |
            Out-File dist/checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-release
          path: dist/*

  # =========================
  # 3. Release Job
  # =========================
  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: enterprise-release
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "${{ needs.version.outputs.tag }}"
          files: |
            dist/AvaloniaApplication1.exe
            dist/AvaloniaApp_Setup.exe
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
